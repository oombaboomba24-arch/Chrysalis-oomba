# Chrysalis — Account Configuration
# Generated by accounts-setup workflow. Update anytime by saying "Update my accounts".
# This file is the single source of truth for all email and calendar access.
# No workflow or sweep should hardcode account names — always read from here.
# ─────────────────────────────────────────────────────────────────────────────

email:
  accounts:
    - provider: outlook
      address: anand.yadav85@outlook.com
      mcp: outlook-mcp-local
      primary: false
      notes: "Job search inbox. outlook-mcp-local MCP — OAuth setup required: run 'npm run setup' in ~/Developer/outlook-mcp-local."
    - provider: gmail
      address: oomba.boomba24@gmail.com
      mcp: gmail
      primary: true
      notes: "Primary job search inbox. Gmail MCP active."

# ─────────────────────────────────────────────────────────────────────────────
calendar:
  # Google Calendar MCP is connected — prep blocks written via API directly.
  google_calendar:
    mcp: google_calendar
    personal_calendar_id: "oomba.boomba24@gmail.com"

  # Also read from Apple Calendar via JXA for any events not in Google Calendar.
  read_names:
    - "Calendar"

  # Write target for prep blocks and debrief reminders.
  write_target: "oomba.boomba24@gmail.com"
  write_mechanism: google_calendar_mcp

  # Deduplication strategy when reading from multiple source calendars.
  dedup_by: title_date
