# Chrysalis — Account Configuration
# Generated by accounts-setup workflow. Update anytime by saying "Update my accounts".
# This file is the single source of truth for all email and calendar access.
# No workflow or sweep should hardcode account names — always read from here.
# ─────────────────────────────────────────────────────────────────────────────

email:
  accounts:
    - provider: outlook
      address: anand.yadav85@outlook.com
      mcp: apple-mail
      primary: false
      notes: "Job search inbox. Set up in Mail.app. Apple Mail MCP must be active in Claude Code session to auto-sweep."
    - provider: gmail
      address: oomba.boomba24@gmail.com
      mcp: none
      primary: true
      notes: "Primary calendar account. Gmail MCP not yet connected — paste signals manually or install Gmail MCP connector."

# ─────────────────────────────────────────────────────────────────────────────
calendar:
  # Apple Calendar aggregates iCloud, Exchange, and Google sources.
  # NOTE: Two calendars are both named "Calendar" — one Outlook, one Google.
  # ACTION REQUIRED: Rename the Google calendar in Calendar.app (e.g. "Google — Anand")
  # then update write_target below to match the new name.
  read_names:
    - "Calendar"       # reads both — dedup_by handles overlaps

  # Write target for prep blocks and debrief reminders.
  # UPDATE THIS once you rename the Google calendar in Calendar.app.
  write_target: "Calendar"
  write_mechanism: jxa

  # Deduplication strategy when reading from multiple source calendars.
  dedup_by: title_date
